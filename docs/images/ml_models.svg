<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bgMl" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf2f8"/>
      <stop offset="100%" style="stop-color:#fce7f3"/>
    </linearGradient>
    <filter id="shMl" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrMl" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect width="1200" height="750" fill="url(#bgMl)" rx="8"/>
  <text x="600" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">ML Pipeline — Kraken Intelligence Agent</text>
  <text x="600" y="55" text-anchor="middle" font-size="11" fill="#64748b">6 Models: Fraud/AML, Churn, Volume Forecast, LTV, Risk Scoring, Ticket Classification</text>

  <!-- Data Sources -->
  <rect x="30" y="80" width="180" height="620" rx="8" fill="white" stroke="#7c3aed" stroke-width="1.5" filter="url(#shMl)"/>
  <text x="120" y="105" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">DATA SOURCES</text>

  <rect x="40" y="120" width="160" height="30" rx="4" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="120" y="140" text-anchor="middle" font-size="9" fill="#4c1d95">TRADES (500K rows)</text>

  <rect x="40" y="160" width="160" height="30" rx="4" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="120" y="180" text-anchor="middle" font-size="9" fill="#4c1d95">CUSTOMERS (10K rows)</text>

  <rect x="40" y="200" width="160" height="30" rx="4" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="120" y="220" text-anchor="middle" font-size="9" fill="#4c1d95">COMPLIANCE_EVENTS</text>

  <rect x="40" y="240" width="160" height="30" rx="4" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="120" y="260" text-anchor="middle" font-size="9" fill="#4c1d95">SUPPORT_TICKETS</text>

  <rect x="40" y="280" width="160" height="30" rx="4" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="120" y="300" text-anchor="middle" font-size="9" fill="#4c1d95">MARKET_DATA (OHLCV)</text>

  <rect x="40" y="320" width="160" height="30" rx="4" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="120" y="340" text-anchor="middle" font-size="9" fill="#4c1d95">WALLETS / STAKING</text>

  <!-- Feature Engineering -->
  <rect x="250" y="80" width="200" height="620" rx="8" fill="white" stroke="#ec4899" stroke-width="1.5" filter="url(#shMl)"/>
  <text x="350" y="105" text-anchor="middle" font-size="11" font-weight="bold" fill="#9d174d">FEATURE ENGINEERING</text>

  <rect x="260" y="120" width="180" height="45" rx="4" fill="#fce7f3" stroke="#f9a8d4"/>
  <text x="350" y="138" text-anchor="middle" font-size="8" font-weight="bold" fill="#831843">Fraud Features</text>
  <text x="350" y="153" text-anchor="middle" font-size="7" fill="#9d174d">tx_velocity, amount_zscore, time_patterns</text>

  <rect x="260" y="175" width="180" height="45" rx="4" fill="#fce7f3" stroke="#f9a8d4"/>
  <text x="350" y="193" text-anchor="middle" font-size="8" font-weight="bold" fill="#831843">Churn Features</text>
  <text x="350" y="208" text-anchor="middle" font-size="7" fill="#9d174d">days_since_trade, frequency_decay, ticket_count</text>

  <rect x="260" y="230" width="180" height="45" rx="4" fill="#fce7f3" stroke="#f9a8d4"/>
  <text x="350" y="248" text-anchor="middle" font-size="8" font-weight="bold" fill="#831843">Volume Features</text>
  <text x="350" y="263" text-anchor="middle" font-size="7" fill="#9d174d">lag_7d, rolling_avg_30d, volatility, day_of_week</text>

  <rect x="260" y="285" width="180" height="45" rx="4" fill="#fce7f3" stroke="#f9a8d4"/>
  <text x="350" y="303" text-anchor="middle" font-size="8" font-weight="bold" fill="#831843">LTV Features</text>
  <text x="350" y="318" text-anchor="middle" font-size="7" fill="#9d174d">total_fees, account_age, tier, staking_amount</text>

  <rect x="260" y="340" width="180" height="45" rx="4" fill="#fce7f3" stroke="#f9a8d4"/>
  <text x="350" y="358" text-anchor="middle" font-size="8" font-weight="bold" fill="#831843">Risk Features</text>
  <text x="350" y="373" text-anchor="middle" font-size="7" fill="#9d174d">leverage, concentration, volatility_exposure</text>

  <rect x="260" y="395" width="180" height="45" rx="4" fill="#fce7f3" stroke="#f9a8d4"/>
  <text x="350" y="413" text-anchor="middle" font-size="8" font-weight="bold" fill="#831843">Ticket NLP Features</text>
  <text x="350" y="428" text-anchor="middle" font-size="7" fill="#9d174d">tfidf_vectors, sentiment, keyword_flags</text>

  <!-- Models -->
  <rect x="490" y="80" width="220" height="620" rx="8" fill="white" stroke="#f97316" stroke-width="1.5" filter="url(#shMl)"/>
  <text x="600" y="105" text-anchor="middle" font-size="11" font-weight="bold" fill="#9a3412">MODEL TRAINING</text>

  <rect x="500" y="120" width="200" height="55" rx="4" fill="#ffedd5" stroke="#fdba74"/>
  <text x="600" y="140" text-anchor="middle" font-size="9" font-weight="bold" fill="#7c2d12">1. Fraud/AML Detection</text>
  <text x="600" y="155" text-anchor="middle" font-size="8" fill="#9a3412">Isolation Forest + Rules</text>
  <text x="600" y="167" text-anchor="middle" font-size="7" fill="#64748b">Output: risk_score (0-100), flagged (bool)</text>

  <rect x="500" y="185" width="200" height="55" rx="4" fill="#ffedd5" stroke="#fdba74"/>
  <text x="600" y="205" text-anchor="middle" font-size="9" font-weight="bold" fill="#7c2d12">2. Customer Churn</text>
  <text x="600" y="220" text-anchor="middle" font-size="8" fill="#9a3412">Gradient Boosted Trees</text>
  <text x="600" y="232" text-anchor="middle" font-size="7" fill="#64748b">Output: churn_probability (0-1)</text>

  <rect x="500" y="250" width="200" height="55" rx="4" fill="#ffedd5" stroke="#fdba74"/>
  <text x="600" y="270" text-anchor="middle" font-size="9" font-weight="bold" fill="#7c2d12">3. Volume Forecast</text>
  <text x="600" y="285" text-anchor="middle" font-size="8" fill="#9a3412">Time-Series (ARIMA-like)</text>
  <text x="600" y="297" text-anchor="middle" font-size="7" fill="#64748b">Output: 7-day forecast per pair</text>

  <rect x="500" y="315" width="200" height="55" rx="4" fill="#ffedd5" stroke="#fdba74"/>
  <text x="600" y="335" text-anchor="middle" font-size="9" font-weight="bold" fill="#7c2d12">4. Customer LTV</text>
  <text x="600" y="350" text-anchor="middle" font-size="8" fill="#9a3412">Linear Regression</text>
  <text x="600" y="362" text-anchor="middle" font-size="7" fill="#64748b">Output: predicted_ltv_usd</text>

  <rect x="500" y="380" width="200" height="55" rx="4" fill="#ffedd5" stroke="#fdba74"/>
  <text x="600" y="400" text-anchor="middle" font-size="9" font-weight="bold" fill="#7c2d12">5. Market Risk Scoring</text>
  <text x="600" y="415" text-anchor="middle" font-size="8" fill="#9a3412">Rules + Scoring Matrix</text>
  <text x="600" y="427" text-anchor="middle" font-size="7" fill="#64748b">Output: risk_grade (A-F)</text>

  <rect x="500" y="445" width="200" height="55" rx="4" fill="#ffedd5" stroke="#fdba74"/>
  <text x="600" y="465" text-anchor="middle" font-size="9" font-weight="bold" fill="#7c2d12">6. Support Ticket Classifier</text>
  <text x="600" y="480" text-anchor="middle" font-size="8" fill="#9a3412">Cortex LLM Classification</text>
  <text x="600" y="492" text-anchor="middle" font-size="7" fill="#64748b">Output: category, confidence</text>

  <!-- Prediction UDFs -->
  <rect x="750" y="80" width="200" height="620" rx="8" fill="white" stroke="#16a34a" stroke-width="1.5" filter="url(#shMl)"/>
  <text x="850" y="105" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">PREDICTION UDFs</text>

  <rect x="760" y="120" width="180" height="40" rx="4" fill="#dcfce7" stroke="#86efac"/>
  <text x="850" y="137" text-anchor="middle" font-size="8" font-weight="bold" fill="#166534">AGENT_GET_FRAUD_ALERTS()</text>
  <text x="850" y="152" text-anchor="middle" font-size="7" fill="#15803d">Returns flagged transactions</text>

  <rect x="760" y="170" width="180" height="40" rx="4" fill="#dcfce7" stroke="#86efac"/>
  <text x="850" y="187" text-anchor="middle" font-size="8" font-weight="bold" fill="#166534">AGENT_GET_CHURN_RISK()</text>
  <text x="850" y="202" text-anchor="middle" font-size="7" fill="#15803d">Returns high-risk customers</text>

  <rect x="760" y="220" width="180" height="40" rx="4" fill="#dcfce7" stroke="#86efac"/>
  <text x="850" y="237" text-anchor="middle" font-size="8" font-weight="bold" fill="#166534">AGENT_GET_VOLUME_FORECAST()</text>
  <text x="850" y="252" text-anchor="middle" font-size="7" fill="#15803d">Returns 7-day predictions</text>

  <rect x="760" y="270" width="180" height="40" rx="4" fill="#dcfce7" stroke="#86efac"/>
  <text x="850" y="287" text-anchor="middle" font-size="8" font-weight="bold" fill="#166534">AGENT_GET_CUSTOMER_LTV()</text>
  <text x="850" y="302" text-anchor="middle" font-size="7" fill="#15803d">Returns LTV predictions</text>

  <rect x="760" y="320" width="180" height="40" rx="4" fill="#dcfce7" stroke="#86efac"/>
  <text x="850" y="337" text-anchor="middle" font-size="8" font-weight="bold" fill="#166534">AGENT_GET_RISK_SCORES()</text>
  <text x="850" y="352" text-anchor="middle" font-size="7" fill="#15803d">Returns position risk grades</text>

  <rect x="760" y="370" width="180" height="40" rx="4" fill="#dcfce7" stroke="#86efac"/>
  <text x="850" y="387" text-anchor="middle" font-size="8" font-weight="bold" fill="#166534">AGENT_CLASSIFY_TICKET()</text>
  <text x="850" y="402" text-anchor="middle" font-size="7" fill="#15803d">Returns ticket category</text>

  <!-- Agent Integration -->
  <rect x="990" y="80" width="180" height="620" rx="8" fill="white" stroke="#29b5e8" stroke-width="2" filter="url(#shMl)"/>
  <text x="1080" y="105" text-anchor="middle" font-size="11" font-weight="bold" fill="#0369a1">AGENT TOOLS</text>

  <rect x="1000" y="125" width="160" height="110" rx="4" fill="#e0f2fe" stroke="#7dd3fc"/>
  <text x="1080" y="145" text-anchor="middle" font-size="9" font-weight="bold" fill="#0c4a6e">KRAKEN_AGENT</text>
  <text x="1080" y="162" text-anchor="middle" font-size="8" fill="#0369a1">tool_spec: generic</text>
  <text x="1080" y="178" text-anchor="middle" font-size="7" fill="#64748b">FraudAlerts → AGENT_GET_FRAUD_ALERTS</text>
  <text x="1080" y="192" text-anchor="middle" font-size="7" fill="#64748b">ChurnRisk → AGENT_GET_CHURN_RISK</text>
  <text x="1080" y="206" text-anchor="middle" font-size="7" fill="#64748b">VolumeForecast → AGENT_GET_VOL...</text>
  <text x="1080" y="220" text-anchor="middle" font-size="7" fill="#64748b">+ 3 more functions</text>

  <!-- Arrows -->
  <path d="M210 200 L250 200" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrMl)"/>
  <path d="M450 250 L490 250" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrMl)"/>
  <path d="M710 300 L750 300" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrMl)"/>
  <path d="M940 200 L990 200" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrMl)"/>

  <!-- Footer -->
  <text x="600" y="730" text-anchor="middle" font-size="10" fill="#94a3b8">ML Pipeline: Data Sources → Feature Engineering → Model Training → UDFs → Agent Integration</text>
</svg>
