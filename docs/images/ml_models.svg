<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
    </marker>
  </defs>

  <!-- White main background -->
  <rect width="1100" height="620" fill="#ffffff"/>

  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#0f172a">ML Models — Questions Answered</text>
  <text x="550" y="56" text-anchor="middle" font-size="12" fill="#64748b">Each model answers specific business questions via SQL UDF functions</text>

  <!-- ═══ MODEL 1: Predict Failure ═══ -->
  <rect x="40" y="80" width="510" height="120" rx="8" fill="#7f1d1d" filter="url(#shadow)"/>
  <text x="295" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">PREDICT_PX_FAILURE()</text>
  <text x="295" y="125" text-anchor="middle" font-size="11" fill="#fecaca">Predicts which PX devices will fail within the next 30 days</text>
  <line x1="60" y1="136" x2="530" y2="136" stroke="#991b1b" stroke-width="1"/>
  <text x="60" y="155" font-size="10" fill="#fef2f2" font-weight="bold">Questions answered:</text>
  <text x="60" y="173" font-size="10" fill="#fecaca">"Which PX devices are at risk of failure in the next 30 days?"</text>
  <text x="60" y="190" font-size="10" fill="#fecaca">"What devices need immediate maintenance attention?"</text>

  <line x1="550" y1="140" x2="580" y2="140" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="585" y="80" width="475" height="120" rx="8" fill="#450a0a" filter="url(#shadow)"/>
  <text x="822" y="105" text-anchor="middle" font-size="11" font-weight="bold" fill="#fca5a5">Returns per device:</text>
  <text x="605" y="128" font-size="10" fill="#fecaca">• risk_score (0-100) with risk_level (Critical/High/Medium/Low)</text>
  <text x="605" y="148" font-size="10" fill="#fecaca">• primary_risk_factor: "High vibration - possible bearing wear"</text>
  <text x="605" y="168" font-size="10" fill="#fecaca">• recommended_action: "Schedule bearing inspection in 14 days"</text>
  <text x="605" y="188" font-size="10" fill="#fecaca">• device_model, installation_site, operating_hours</text>

  <!-- ═══ MODEL 2: Score Efficiency ═══ -->
  <rect x="40" y="215" width="510" height="120" rx="8" fill="#1e3a8a" filter="url(#shadow)"/>
  <text x="295" y="240" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">SCORE_ENERGY_EFFICIENCY()</text>
  <text x="295" y="260" text-anchor="middle" font-size="11" fill="#bfdbfe">Scores device efficiency vs. design specs, identifies savings</text>
  <line x1="60" y1="271" x2="530" y2="271" stroke="#1d4ed8" stroke-width="1"/>
  <text x="60" y="290" font-size="10" fill="#eff6ff" font-weight="bold">Questions answered:</text>
  <text x="60" y="308" font-size="10" fill="#bfdbfe">"What is the energy efficiency gap across our fleet?"</text>
  <text x="60" y="325" font-size="10" fill="#bfdbfe">"How much energy could we save by optimizing underperforming devices?"</text>

  <line x1="550" y1="275" x2="580" y2="275" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="585" y="215" width="475" height="120" rx="8" fill="#172554" filter="url(#shadow)"/>
  <text x="822" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#93c5fd">Returns per model/region:</text>
  <text x="605" y="263" font-size="10" fill="#bfdbfe">• avg_efficiency vs design_efficiency (e.g. 96.2% vs 98.7%)</text>
  <text x="605" y="283" font-size="10" fill="#bfdbfe">• efficiency_gap_pct and rating (Excellent/Good/Fair/Poor)</text>
  <text x="605" y="303" font-size="10" fill="#bfdbfe">• potential_energy_savings_kwh: 125,000</text>
  <text x="605" y="323" font-size="10" fill="#bfdbfe">• device_count per group</text>

  <!-- ═══ MODEL 3: Forecast Demand ═══ -->
  <rect x="40" y="350" width="510" height="120" rx="8" fill="#064e3b" filter="url(#shadow)"/>
  <text x="295" y="375" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">FORECAST_DEMAND()</text>
  <text x="295" y="395" text-anchor="middle" font-size="11" fill="#a7f3d0">Forecasts product demand by region for next quarter</text>
  <line x1="60" y1="406" x2="530" y2="406" stroke="#059669" stroke-width="1"/>
  <text x="60" y="425" font-size="10" fill="#ecfdf5" font-weight="bold">Questions answered:</text>
  <text x="60" y="443" font-size="10" fill="#a7f3d0">"What is the demand forecast for next quarter by product line?"</text>
  <text x="60" y="460" font-size="10" fill="#a7f3d0">"Which regions are showing the strongest demand growth?"</text>

  <line x1="550" y1="410" x2="580" y2="410" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="585" y="350" width="475" height="120" rx="8" fill="#022c22" filter="url(#shadow)"/>
  <text x="822" y="375" text-anchor="middle" font-size="11" font-weight="bold" fill="#6ee7b7">Returns per product/region:</text>
  <text x="605" y="398" font-size="10" fill="#a7f3d0">• forecast_units: 180 | forecast_revenue: $45.2M</text>
  <text x="605" y="418" font-size="10" fill="#a7f3d0">• confidence: High/Medium/Low</text>
  <text x="605" y="438" font-size="10" fill="#a7f3d0">• growth_rate_pct: 8.0%</text>
  <text x="605" y="458" font-size="10" fill="#a7f3d0">• historical_units vs pipeline_units</text>

  <!-- ═══ MODEL 4: Equipment Health ═══ -->
  <rect x="40" y="485" width="510" height="120" rx="8" fill="#78350f" filter="url(#shadow)"/>
  <text x="295" y="510" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">CALCULATE_EQUIPMENT_HEALTH()</text>
  <text x="295" y="530" text-anchor="middle" font-size="11" fill="#fde68a">Composite health score: efficiency + vibration + maintenance + age</text>
  <line x1="60" y1="541" x2="530" y2="541" stroke="#d97706" stroke-width="1"/>
  <text x="60" y="560" font-size="10" fill="#fefce8" font-weight="bold">Questions answered:</text>
  <text x="60" y="578" font-size="10" fill="#fde68a">"What is the equipment health score distribution across our fleet?"</text>
  <text x="60" y="595" font-size="10" fill="#fde68a">"Which devices are in critical condition and what's the top concern?"</text>

  <line x1="550" y1="545" x2="580" y2="545" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="585" y="485" width="475" height="120" rx="8" fill="#451a03" filter="url(#shadow)"/>
  <text x="822" y="510" text-anchor="middle" font-size="11" font-weight="bold" fill="#fbbf24">Returns per device:</text>
  <text x="605" y="533" font-size="10" fill="#fde68a">• health_score (0-100): Excellent/Good/Fair/Poor/Critical</text>
  <text x="605" y="553" font-size="10" fill="#fde68a">• Component scores: efficiency, vibration, maintenance, age</text>
  <text x="605" y="573" font-size="10" fill="#fde68a">• top_concern: "High vibration - bearing inspection needed"</text>
  <text x="605" y="593" font-size="10" fill="#fde68a">• device_model, serial_number, installation_site</text>
</svg>
