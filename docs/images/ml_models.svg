<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="featureGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="modelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="deployGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="shadow3" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1000" height="550" fill="#f8fafc"/>
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">ML Models Pipeline — Energy Recovery</text>

  <!-- DATA SOURCES -->
  <text x="110" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#2563eb">DATA SOURCES</text>

  <rect x="30" y="90" width="160" height="40" rx="6" fill="url(#dataGrad)" filter="url(#shadow3)"/>
  <text x="110" y="114" text-anchor="middle" font-size="9" fill="white" font-weight="bold">DEVICE_TELEMETRY</text>

  <rect x="30" y="140" width="160" height="40" rx="6" fill="url(#dataGrad)" filter="url(#shadow3)"/>
  <text x="110" y="164" text-anchor="middle" font-size="9" fill="white" font-weight="bold">DEVICE_REGISTRY</text>

  <rect x="30" y="190" width="160" height="40" rx="6" fill="url(#dataGrad)" filter="url(#shadow3)"/>
  <text x="110" y="214" text-anchor="middle" font-size="9" fill="white" font-weight="bold">ALARMS</text>

  <rect x="30" y="240" width="160" height="40" rx="6" fill="url(#dataGrad)" filter="url(#shadow3)"/>
  <text x="110" y="264" text-anchor="middle" font-size="9" fill="white" font-weight="bold">MAINTENANCE_LOGS</text>

  <rect x="30" y="290" width="160" height="40" rx="6" fill="url(#dataGrad)" filter="url(#shadow3)"/>
  <text x="110" y="314" text-anchor="middle" font-size="9" fill="white" font-weight="bold">SALES_ORDERS</text>

  <rect x="30" y="340" width="160" height="40" rx="6" fill="url(#dataGrad)" filter="url(#shadow3)"/>
  <text x="110" y="364" text-anchor="middle" font-size="9" fill="white" font-weight="bold">OPPORTUNITIES</text>

  <!-- FEATURE ENGINEERING -->
  <text x="340" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#7c3aed">FEATURE ENGINEERING</text>

  <rect x="240" y="95" width="200" height="55" rx="8" fill="url(#featureGrad)" filter="url(#shadow3)"/>
  <text x="340" y="116" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Vibration Analysis</text>
  <text x="340" y="132" text-anchor="middle" font-size="8" fill="#ddd6fe">AVG, trend, threshold breach</text>
  <text x="340" y="144" text-anchor="middle" font-size="8" fill="#ddd6fe">count &gt; 5.0 mm/s</text>

  <rect x="240" y="165" width="200" height="55" rx="8" fill="url(#featureGrad)" filter="url(#shadow3)"/>
  <text x="340" y="186" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Efficiency Metrics</text>
  <text x="340" y="202" text-anchor="middle" font-size="8" fill="#ddd6fe">AVG recovery %, gap vs design</text>
  <text x="340" y="214" text-anchor="middle" font-size="8" fill="#ddd6fe">degradation rate</text>

  <rect x="240" y="235" width="200" height="55" rx="8" fill="url(#featureGrad)" filter="url(#shadow3)"/>
  <text x="340" y="256" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Operational Features</text>
  <text x="340" y="272" text-anchor="middle" font-size="8" fill="#ddd6fe">Operating hours, age,</text>
  <text x="340" y="284" text-anchor="middle" font-size="8" fill="#ddd6fe">days since service, alarm count</text>

  <rect x="240" y="305" width="200" height="55" rx="8" fill="url(#featureGrad)" filter="url(#shadow3)"/>
  <text x="340" y="326" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Demand Signals</text>
  <text x="340" y="342" text-anchor="middle" font-size="8" fill="#ddd6fe">Historical orders, pipeline,</text>
  <text x="340" y="354" text-anchor="middle" font-size="8" fill="#ddd6fe">seasonal patterns, backlog</text>

  <!-- Arrows: Data to Features -->
  <path d="M 190 110 L 235 120" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 190 160 L 235 170" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 190 260 L 235 260" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 190 310 L 235 330" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 190 360 L 235 340" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- MODEL SCORING -->
  <text x="590" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#059669">MODEL SCORING</text>

  <rect x="490" y="90" width="200" height="65" rx="8" fill="url(#modelGrad)" filter="url(#shadow3)"/>
  <text x="590" y="112" text-anchor="middle" font-size="10" fill="white" font-weight="bold">PREDICT_PX_FAILURE</text>
  <text x="590" y="130" text-anchor="middle" font-size="8" fill="#a7f3d0">Rule-based risk scoring (0-100)</text>
  <text x="590" y="145" text-anchor="middle" font-size="8" fill="#a7f3d0">Weighted: vib 40% + eff 30% + temp 20%</text>

  <rect x="490" y="170" width="200" height="65" rx="8" fill="url(#modelGrad)" filter="url(#shadow3)"/>
  <text x="590" y="192" text-anchor="middle" font-size="10" fill="white" font-weight="bold">SCORE_ENERGY_EFFICIENCY</text>
  <text x="590" y="210" text-anchor="middle" font-size="8" fill="#a7f3d0">Actual vs design spec comparison</text>
  <text x="590" y="225" text-anchor="middle" font-size="8" fill="#a7f3d0">Gap analysis + savings estimate</text>

  <rect x="490" y="250" width="200" height="65" rx="8" fill="url(#modelGrad)" filter="url(#shadow3)"/>
  <text x="590" y="272" text-anchor="middle" font-size="10" fill="white" font-weight="bold">FORECAST_DEMAND</text>
  <text x="590" y="290" text-anchor="middle" font-size="8" fill="#a7f3d0">Historical trend + 8% growth</text>
  <text x="590" y="305" text-anchor="middle" font-size="8" fill="#a7f3d0">Pipeline-weighted adjustment</text>

  <rect x="490" y="330" width="200" height="65" rx="8" fill="url(#modelGrad)" filter="url(#shadow3)"/>
  <text x="590" y="352" text-anchor="middle" font-size="10" fill="white" font-weight="bold">CALCULATE_EQUIPMENT_HEALTH</text>
  <text x="590" y="370" text-anchor="middle" font-size="8" fill="#a7f3d0">Composite: eff 35% + vib 30%</text>
  <text x="590" y="385" text-anchor="middle" font-size="8" fill="#a7f3d0">+ maint 20% + age 15%</text>

  <!-- Arrows: Features to Models -->
  <path d="M 440 122 L 485 122" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 440 192 L 485 200" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 440 262 L 485 270" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 440 332 L 485 350" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- DEPLOYMENT -->
  <text x="840" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#d97706">DEPLOYMENT</text>

  <rect x="740" y="90" width="210" height="60" rx="8" fill="url(#deployGrad)" filter="url(#shadow3)"/>
  <text x="845" y="114" text-anchor="middle" font-size="10" fill="white" font-weight="bold">SQL UDF (RETURNS ARRAY)</text>
  <text x="845" y="132" text-anchor="middle" font-size="8" fill="#fef3c7">Deployed to ML_MODELS schema</text>
  <text x="845" y="144" text-anchor="middle" font-size="8" fill="#fef3c7">Executed via ENERGY_RECOVERY_WH</text>

  <rect x="740" y="170" width="210" height="60" rx="8" fill="url(#deployGrad)" filter="url(#shadow3)"/>
  <text x="845" y="194" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Agent Tool (Generic)</text>
  <text x="845" y="212" text-anchor="middle" font-size="8" fill="#fef3c7">Registered in Agent spec</text>
  <text x="845" y="224" text-anchor="middle" font-size="8" fill="#fef3c7">type: function</text>

  <rect x="740" y="250" width="210" height="60" rx="8" fill="url(#deployGrad)" filter="url(#shadow3)"/>
  <text x="845" y="274" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Natural Language Access</text>
  <text x="845" y="292" text-anchor="middle" font-size="8" fill="#fef3c7">User asks → Agent routes →</text>
  <text x="845" y="304" text-anchor="middle" font-size="8" fill="#fef3c7">Function executes → Results returned</text>

  <!-- Arrows: Models to Deploy -->
  <path d="M 690 122 L 735 120" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 690 202 L 735 200" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 690 280 L 735 280" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- Output Examples -->
  <rect x="50" y="420" width="900" height="110" rx="10" fill="white" stroke="#e2e8f0" filter="url(#shadow3)"/>
  <text x="500" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">Model Outputs (Example)</text>

  <text x="80" y="470" font-size="9" fill="#475569" font-weight="bold">PredictFailure:</text>
  <text x="175" y="470" font-size="9" fill="#475569">{device_id, risk_score: 82, risk_level: "Critical", primary_risk_factor: "High vibration", recommended_action: "..."}</text>

  <text x="80" y="490" font-size="9" fill="#475569" font-weight="bold">ScoreEfficiency:</text>
  <text x="175" y="490" font-size="9" fill="#475569">{device_model: "PX-Q650", avg_efficiency: 96.2, design: 98.7, gap: 2.5%, potential_savings_kwh: 125000}</text>

  <text x="80" y="510" font-size="9" fill="#475569" font-weight="bold">ForecastDemand:</text>
  <text x="175" y="510" font-size="9" fill="#475569">{product_line: "Desalination", region: "MENA", forecast_units: 180, forecast_revenue: $45.2M, confidence: "High"}</text>

  <text x="80" y="530" font-size="9" fill="#475569" font-weight="bold">EquipmentHealth:</text>
  <text x="175" y="530" font-size="9" fill="#475569">{device_id, health_score: 45, status: "Poor", top_concern: "High vibration - bearing inspection needed"}</text>
</svg>
