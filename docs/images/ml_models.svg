<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>

  <!-- White Background -->
  <rect width="1100" height="600" fill="#ffffff"/>

  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#0f172a">ML Models — Questions Answered</text>
  <text x="550" y="56" text-anchor="middle" font-size="12" fill="#64748b">Each model answers specific business questions via SQL UDF functions</text>

  <!-- ═══════════ MODEL 1: Predict Failure ═══════════ -->
  <rect x="40" y="85" width="490" height="110" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="285" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#991b1b">PREDICT_PX_FAILURE()</text>
  <text x="285" y="130" text-anchor="middle" font-size="11" fill="#7f1d1d">Predicts which PX devices will fail within the next 30 days</text>
  <line x1="60" y1="142" x2="510" y2="142" stroke="#fecaca" stroke-width="1"/>
  <text x="60" y="160" font-size="10" fill="#334155" font-weight="bold">Questions answered:</text>
  <text x="60" y="177" font-size="10" fill="#475569">• "Which PX devices are at risk of failure in the next 30 days?"</text>
  <text x="60" y="192" font-size="10" fill="#475569">• "What devices need immediate maintenance attention?"</text>

  <!-- Model 1: Output -->
  <rect x="570" y="85" width="490" height="110" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1" filter="url(#shadow)"/>
  <text x="815" y="108" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">Output</text>
  <text x="590" y="128" font-size="9" fill="#475569">device_id, serial_number, device_model, installation_site</text>
  <text x="590" y="146" font-size="9" fill="#475569">risk_score: 0-100 | risk_level: Critical/High/Medium/Low</text>
  <text x="590" y="164" font-size="9" fill="#475569">primary_risk_factor: "High vibration - possible bearing wear"</text>
  <text x="590" y="182" font-size="9" fill="#475569">recommended_action: "Schedule bearing inspection within 14 days"</text>

  <line x1="530" y1="140" x2="565" y2="140" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════ MODEL 2: Score Efficiency ═══════════ -->
  <rect x="40" y="215" width="490" height="110" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="285" y="240" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">SCORE_ENERGY_EFFICIENCY()</text>
  <text x="285" y="260" text-anchor="middle" font-size="11" fill="#1e3a8a">Scores device efficiency vs. design specs and identifies savings</text>
  <line x1="60" y1="272" x2="510" y2="272" stroke="#bfdbfe" stroke-width="1"/>
  <text x="60" y="290" font-size="10" fill="#334155" font-weight="bold">Questions answered:</text>
  <text x="60" y="307" font-size="10" fill="#475569">• "What is the energy efficiency gap across our fleet?"</text>
  <text x="60" y="322" font-size="10" fill="#475569">• "How much energy could we save by optimizing underperforming devices?"</text>

  <!-- Model 2: Output -->
  <rect x="570" y="215" width="490" height="110" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1" filter="url(#shadow)"/>
  <text x="815" y="238" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Output</text>
  <text x="590" y="258" font-size="9" fill="#475569">device_model, site_region, device_count</text>
  <text x="590" y="276" font-size="9" fill="#475569">avg_efficiency: 96.2% | design_efficiency: 98.7%</text>
  <text x="590" y="294" font-size="9" fill="#475569">efficiency_gap: 2.5% | rating: Good/Fair/Poor</text>
  <text x="590" y="312" font-size="9" fill="#475569">potential_energy_savings_kwh: 125,000</text>

  <line x1="530" y1="270" x2="565" y2="270" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════ MODEL 3: Forecast Demand ═══════════ -->
  <rect x="40" y="345" width="490" height="110" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="285" y="370" text-anchor="middle" font-size="14" font-weight="bold" fill="#065f46">FORECAST_DEMAND()</text>
  <text x="285" y="390" text-anchor="middle" font-size="11" fill="#064e3b">Forecasts product demand by region for next quarter</text>
  <line x1="60" y1="402" x2="510" y2="402" stroke="#a7f3d0" stroke-width="1"/>
  <text x="60" y="420" font-size="10" fill="#334155" font-weight="bold">Questions answered:</text>
  <text x="60" y="437" font-size="10" fill="#475569">• "What is the demand forecast for next quarter by product line?"</text>
  <text x="60" y="452" font-size="10" fill="#475569">• "Which regions are showing the strongest demand growth?"</text>

  <!-- Model 3: Output -->
  <rect x="570" y="345" width="490" height="110" rx="8" fill="#ffffff" stroke="#059669" stroke-width="1" filter="url(#shadow)"/>
  <text x="815" y="368" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">Output</text>
  <text x="590" y="388" font-size="9" fill="#475569">product_line, region, forecast_quarter</text>
  <text x="590" y="406" font-size="9" fill="#475569">forecast_units: 180 | forecast_revenue: $45.2M</text>
  <text x="590" y="424" font-size="9" fill="#475569">confidence: High/Medium/Low</text>
  <text x="590" y="442" font-size="9" fill="#475569">growth_rate_pct: 8.0%</text>

  <line x1="530" y1="400" x2="565" y2="400" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════ MODEL 4: Equipment Health ═══════════ -->
  <rect x="40" y="475" width="490" height="110" rx="8" fill="#ffffff" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
  <text x="285" y="500" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">CALCULATE_EQUIPMENT_HEALTH()</text>
  <text x="285" y="520" text-anchor="middle" font-size="11" fill="#78350f">Composite health score combining efficiency, vibration, maintenance, age</text>
  <line x1="60" y1="532" x2="510" y2="532" stroke="#fde68a" stroke-width="1"/>
  <text x="60" y="550" font-size="10" fill="#334155" font-weight="bold">Questions answered:</text>
  <text x="60" y="567" font-size="10" fill="#475569">• "What is the equipment health score distribution across our fleet?"</text>
  <text x="60" y="582" font-size="10" fill="#475569">• "Which devices are in critical condition and what is the top concern?"</text>

  <!-- Model 4: Output -->
  <rect x="570" y="475" width="490" height="110" rx="8" fill="#ffffff" stroke="#d97706" stroke-width="1" filter="url(#shadow)"/>
  <text x="815" y="498" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Output</text>
  <text x="590" y="518" font-size="9" fill="#475569">device_id, serial_number, device_model, installation_site</text>
  <text x="590" y="536" font-size="9" fill="#475569">health_score: 0-100 | status: Excellent/Good/Fair/Poor/Critical</text>
  <text x="590" y="554" font-size="9" fill="#475569">efficiency_score, vibration_score, maintenance_score, age_score</text>
  <text x="590" y="572" font-size="9" fill="#475569">top_concern: "High vibration - bearing inspection needed"</text>

  <line x1="530" y1="530" x2="565" y2="530" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
