<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bgQtc" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <filter id="shQtc" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrBlue" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#3b82f6"/>
    </marker>
    <marker id="arrGrn" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrOrg" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#f97316"/>
    </marker>
  </defs>

  <rect width="1200" height="900" fill="url(#bgQtc)" rx="8"/>
  <text x="600" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">Query Tool Chain — Kraken Intelligence Agent</text>
  <text x="600" y="55" text-anchor="middle" font-size="11" fill="#64748b">Example questions mapped to tool paths showing when each tool is used and whether the ontology is leveraged</text>

  <!-- Legend -->
  <rect x="30" y="70" width="340" height="75" rx="6" fill="white" stroke="#e2e8f0" filter="url(#shQtc)"/>
  <rect x="45" y="85" width="12" height="12" rx="2" fill="#3b82f6"/>
  <text x="63" y="95" font-size="9" fill="#334155">Cortex Analyst (Text-to-SQL via Semantic View)</text>
  <rect x="45" y="105" width="12" height="12" rx="2" fill="#16a34a"/>
  <text x="63" y="115" font-size="9" fill="#334155">Cortex Search (Unstructured Retrieval)</text>
  <rect x="45" y="125" width="12" height="12" rx="2" fill="#f97316"/>
  <text x="63" y="135" font-size="9" fill="#334155">ML Functions (Prediction UDFs)</text>

  <!-- Example 1: Executive Question - Analyst Path -->
  <rect x="30" y="165" width="1140" height="115" rx="8" fill="white" stroke="#3b82f6" stroke-width="1.5" filter="url(#shQtc)"/>
  <rect x="30" y="165" width="1140" height="25" rx="8" fill="#3b82f6"/>
  <text x="50" y="182" font-size="10" font-weight="bold" fill="white">EXAMPLE 1 — Executive/PM Persona</text>
  <text x="600" y="182" font-size="9" fill="#bfdbfe">Tool: Cortex Analyst | Uses Ontology: No (operational data)</text>

  <rect x="45" y="200" width="250" height="35" rx="4" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="170" y="215" text-anchor="middle" font-size="9" font-weight="bold" fill="#1e40af">User Question:</text>
  <text x="170" y="228" text-anchor="middle" font-size="8" fill="#1e3a8a">"What was our total trading volume last week?"</text>

  <path d="M295 218 L345 218" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrBlue)"/>

  <rect x="345" y="200" width="140" height="35" rx="4" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="415" y="215" text-anchor="middle" font-size="8" font-weight="bold" fill="#1e40af">KRAKEN_AGENT</text>
  <text x="415" y="228" text-anchor="middle" font-size="7" fill="#2563eb">Routes to Analyst</text>

  <path d="M485 218 L535 218" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrBlue)"/>

  <rect x="535" y="200" width="180" height="35" rx="4" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="625" y="215" text-anchor="middle" font-size="8" font-weight="bold" fill="#1e40af">Cortex Analyst Tool</text>
  <text x="625" y="228" text-anchor="middle" font-size="7" fill="#2563eb">KRAKEN_TRADING_SV</text>

  <path d="M715 218 L765 218" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrBlue)"/>

  <rect x="765" y="200" width="180" height="35" rx="4" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="855" y="215" text-anchor="middle" font-size="8" font-weight="bold" fill="#1e40af">Generated SQL</text>
  <text x="855" y="228" text-anchor="middle" font-size="7" fill="#2563eb">SELECT SUM(quantity*price) FROM TRADES...</text>

  <path d="M945 218 L995 218" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrBlue)"/>

  <rect x="995" y="200" width="160" height="35" rx="4" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="1075" y="215" text-anchor="middle" font-size="8" font-weight="bold" fill="#1e40af">Result</text>
  <text x="1075" y="228" text-anchor="middle" font-size="7" fill="#1e3a8a">"$2.4B total volume"</text>

  <!-- Example 2: Compliance Question - Analyst + Ontology -->
  <rect x="30" y="300" width="1140" height="115" rx="8" fill="white" stroke="#3b82f6" stroke-width="1.5" filter="url(#shQtc)"/>
  <rect x="30" y="300" width="1140" height="25" rx="8" fill="#7c3aed"/>
  <text x="50" y="317" font-size="10" font-weight="bold" fill="white">EXAMPLE 2 — Compliance Persona (Ontology Path)</text>
  <text x="600" y="317" font-size="9" fill="#e9d5ff">Tool: Cortex Analyst | Uses Ontology: YES (blockchain concepts)</text>

  <rect x="45" y="335" width="270" height="35" rx="4" fill="#faf5ff" stroke="#c4b5fd"/>
  <text x="180" y="350" text-anchor="middle" font-size="9" font-weight="bold" fill="#6d28d9">User Question:</text>
  <text x="180" y="363" text-anchor="middle" font-size="8" fill="#5b21b6">"What consensus mechanisms are used by our listed chains?"</text>

  <path d="M315 353 L345 353" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrBlue)"/>

  <rect x="345" y="335" width="140" height="35" rx="4" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="415" y="350" text-anchor="middle" font-size="8" font-weight="bold" fill="#1e40af">KRAKEN_AGENT</text>
  <text x="415" y="363" text-anchor="middle" font-size="7" fill="#2563eb">Routes to Analyst</text>

  <path d="M485 353 L535 353" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrBlue)"/>

  <rect x="535" y="335" width="180" height="35" rx="4" fill="#f5f3ff" stroke="#a78bfa"/>
  <text x="625" y="350" text-anchor="middle" font-size="8" font-weight="bold" fill="#6d28d9">Cortex Analyst Tool</text>
  <text x="625" y="363" text-anchor="middle" font-size="7" fill="#7c3aed">DLT_BLOCKCHAIN_ONTOLOGY_SV</text>

  <path d="M715 353 L765 353" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrBlue)"/>

  <rect x="765" y="335" width="180" height="35" rx="4" fill="#f5f3ff" stroke="#a78bfa"/>
  <text x="855" y="350" text-anchor="middle" font-size="8" font-weight="bold" fill="#6d28d9">Generated SQL</text>
  <text x="855" y="363" text-anchor="middle" font-size="7" fill="#7c3aed">SELECT b.NAME, c.NAME FROM BLOCKCHAIN...</text>

  <path d="M945 353 L995 353" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrBlue)"/>

  <rect x="995" y="335" width="160" height="35" rx="4" fill="#faf5ff" stroke="#c4b5fd"/>
  <text x="1075" y="350" text-anchor="middle" font-size="8" font-weight="bold" fill="#6d28d9">Result</text>
  <text x="1075" y="363" text-anchor="middle" font-size="7" fill="#5b21b6">"BTC=PoW, ETH=PoS..."</text>

  <!-- Example 3: Search Path -->
  <rect x="30" y="435" width="1140" height="115" rx="8" fill="white" stroke="#16a34a" stroke-width="1.5" filter="url(#shQtc)"/>
  <rect x="30" y="435" width="1140" height="25" rx="8" fill="#16a34a"/>
  <text x="50" y="452" font-size="10" font-weight="bold" fill="white">EXAMPLE 3 — Support Manager Persona</text>
  <text x="600" y="452" font-size="9" fill="#bbf7d0">Tool: Cortex Search | Uses Ontology: No (unstructured tickets)</text>

  <rect x="45" y="470" width="250" height="35" rx="4" fill="#f0fdf4" stroke="#86efac"/>
  <text x="170" y="485" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">User Question:</text>
  <text x="170" y="498" text-anchor="middle" font-size="8" fill="#15803d">"Find tickets about failed withdrawals to Ledger wallets"</text>

  <path d="M295 488 L345 488" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrGrn)"/>

  <rect x="345" y="470" width="140" height="35" rx="4" fill="#dcfce7" stroke="#4ade80"/>
  <text x="415" y="485" text-anchor="middle" font-size="8" font-weight="bold" fill="#166534">KRAKEN_AGENT</text>
  <text x="415" y="498" text-anchor="middle" font-size="7" fill="#16a34a">Routes to Search</text>

  <path d="M485 488 L535 488" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrGrn)"/>

  <rect x="535" y="470" width="180" height="35" rx="4" fill="#dcfce7" stroke="#4ade80"/>
  <text x="625" y="485" text-anchor="middle" font-size="8" font-weight="bold" fill="#166534">Cortex Search Tool</text>
  <text x="625" y="498" text-anchor="middle" font-size="7" fill="#16a34a">SUPPORT_TICKET_SEARCH</text>

  <path d="M715 488 L765 488" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrGrn)"/>

  <rect x="765" y="470" width="180" height="35" rx="4" fill="#dcfce7" stroke="#4ade80"/>
  <text x="855" y="485" text-anchor="middle" font-size="8" font-weight="bold" fill="#166534">Semantic Search</text>
  <text x="855" y="498" text-anchor="middle" font-size="7" fill="#16a34a">Vector similarity on ticket text</text>

  <path d="M945 488 L995 488" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrGrn)"/>

  <rect x="995" y="470" width="160" height="35" rx="4" fill="#f0fdf4" stroke="#86efac"/>
  <text x="1075" y="485" text-anchor="middle" font-size="8" font-weight="bold" fill="#166534">Result</text>
  <text x="1075" y="498" text-anchor="middle" font-size="7" fill="#15803d">Top 10 matching tickets</text>

  <!-- Example 4: ML Function Path -->
  <rect x="30" y="570" width="1140" height="115" rx="8" fill="white" stroke="#f97316" stroke-width="1.5" filter="url(#shQtc)"/>
  <rect x="30" y="570" width="1140" height="25" rx="8" fill="#f97316"/>
  <text x="50" y="587" font-size="10" font-weight="bold" fill="white">EXAMPLE 4 — Compliance Persona (ML Path)</text>
  <text x="600" y="587" font-size="9" fill="#fed7aa">Tool: ML Function (UDF) | Uses Ontology: No (prediction model)</text>

  <rect x="45" y="605" width="250" height="35" rx="4" fill="#fff7ed" stroke="#fdba74"/>
  <text x="170" y="620" text-anchor="middle" font-size="9" font-weight="bold" fill="#9a3412">User Question:</text>
  <text x="170" y="633" text-anchor="middle" font-size="8" fill="#7c2d12">"Which customers have suspicious transaction patterns?"</text>

  <path d="M295 623 L345 623" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrOrg)"/>

  <rect x="345" y="605" width="140" height="35" rx="4" fill="#ffedd5" stroke="#fb923c"/>
  <text x="415" y="620" text-anchor="middle" font-size="8" font-weight="bold" fill="#9a3412">KRAKEN_AGENT</text>
  <text x="415" y="633" text-anchor="middle" font-size="7" fill="#ea580c">Routes to Function</text>

  <path d="M485 623 L535 623" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrOrg)"/>

  <rect x="535" y="605" width="180" height="35" rx="4" fill="#ffedd5" stroke="#fb923c"/>
  <text x="625" y="620" text-anchor="middle" font-size="8" font-weight="bold" fill="#9a3412">FraudAlerts Tool</text>
  <text x="625" y="633" text-anchor="middle" font-size="7" fill="#ea580c">AGENT_GET_FRAUD_ALERTS()</text>

  <path d="M715 623 L765 623" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrOrg)"/>

  <rect x="765" y="605" width="180" height="35" rx="4" fill="#ffedd5" stroke="#fb923c"/>
  <text x="855" y="620" text-anchor="middle" font-size="8" font-weight="bold" fill="#9a3412">ML Inference</text>
  <text x="855" y="633" text-anchor="middle" font-size="7" fill="#ea580c">Anomaly detection + scoring</text>

  <path d="M945 623 L995 623" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrOrg)"/>

  <rect x="995" y="605" width="160" height="35" rx="4" fill="#fff7ed" stroke="#fdba74"/>
  <text x="1075" y="620" text-anchor="middle" font-size="8" font-weight="bold" fill="#9a3412">Result</text>
  <text x="1075" y="633" text-anchor="middle" font-size="7" fill="#7c2d12">Flagged customers + scores</text>

  <!-- Example 5: Multi-tool -->
  <rect x="30" y="705" width="1140" height="115" rx="8" fill="white" stroke="#64748b" stroke-width="1.5" filter="url(#shQtc)"/>
  <rect x="30" y="705" width="1140" height="25" rx="8" fill="#475569"/>
  <text x="50" y="722" font-size="10" font-weight="bold" fill="white">EXAMPLE 5 — Multi-Tool (Complex Question)</text>
  <text x="600" y="722" font-size="9" fill="#cbd5e1">Tools: Analyst + Function | Uses Ontology: No (combined structured + ML)</text>

  <rect x="45" y="740" width="280" height="35" rx="4" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="185" y="755" text-anchor="middle" font-size="9" font-weight="bold" fill="#334155">User Question:</text>
  <text x="185" y="768" text-anchor="middle" font-size="8" fill="#475569">"Show high-LTV customers at risk of churning with their recent volume"</text>

  <path d="M325 758 L355 758" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="355" y="740" width="120" height="35" rx="4" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="415" y="755" text-anchor="middle" font-size="8" font-weight="bold" fill="#334155">KRAKEN_AGENT</text>
  <text x="415" y="768" text-anchor="middle" font-size="7" fill="#475569">Multi-tool plan</text>

  <path d="M475 748 L525 738" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrBlue)"/>
  <path d="M475 768 L525 778" stroke="#f97316" stroke-width="1.2" marker-end="url(#arrOrg)"/>

  <rect x="525" y="728" width="130" height="25" rx="4" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="590" y="745" text-anchor="middle" font-size="7" fill="#1e40af">Analyst: Get volume data</text>

  <rect x="525" y="763" width="130" height="25" rx="4" fill="#ffedd5" stroke="#fb923c"/>
  <text x="590" y="780" text-anchor="middle" font-size="7" fill="#9a3412">Function: Churn + LTV scores</text>

  <path d="M655 740 L700 755" stroke="#64748b" stroke-width="1.2"/>
  <path d="M655 775 L700 760" stroke="#64748b" stroke-width="1.2"/>

  <rect x="700" y="745" width="130" height="30" rx="4" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="765" y="762" text-anchor="middle" font-size="8" font-weight="bold" fill="#334155">Synthesize Results</text>

  <path d="M830 760 L880 760" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="880" y="745" width="280" height="30" rx="4" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="1020" y="764" text-anchor="middle" font-size="7" fill="#475569">Combined response: "3 high-LTV customers show churn signals: Alice ($45K LTV, 87% churn)..."</text>

  <!-- Footer -->
  <text x="600" y="880" text-anchor="middle" font-size="10" fill="#94a3b8">Query Tool Chain | Kraken Intelligence Agent | Snowflake Cortex Orchestration</text>
</svg>
