<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
    </marker>
  </defs>

  <!-- White main background -->
  <rect width="1200" height="780" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="32" text-anchor="middle" font-size="22" font-weight="bold" fill="#0f172a">Query Tool Chain — Example Routing</text>
  <text x="600" y="52" text-anchor="middle" font-size="12" fill="#64748b">How the agent routes questions to tools and whether the ISA-95 ontology is used</text>

  <!-- Column Headers -->
  <rect x="40" y="68" width="1120" height="28" rx="4" fill="#f1f5f9"/>
  <text x="210" y="87" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">USER QUESTION</text>
  <text x="520" y="87" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">TOOL SELECTED</text>
  <text x="790" y="87" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">TARGET RESOURCE</text>
  <text x="1040" y="87" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">ONTOLOGY?</text>

  <!-- ═══ ROW 1: Financial ═══ -->
  <rect x="40" y="108" width="340" height="55" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="210" y="132" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">"What was our total revenue</text>
  <text x="210" y="148" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">for Q1 2026?"</text>

  <line x1="380" y1="135" x2="415" y2="135" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="420" y="113" width="190" height="44" rx="6" fill="#4338ca" filter="url(#shadow)"/>
  <text x="515" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">FinancialAnalyst</text>

  <line x1="610" y1="135" x2="645" y2="135" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="650" y="113" width="240" height="44" rx="6" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="770" y="140" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">SV_FINANCIAL_OPS</text>

  <rect x="960" y="116" width="140" height="38" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1030" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">No</text>

  <!-- ═══ ROW 2: CRM ═══ -->
  <rect x="40" y="180" width="340" height="55" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="210" y="204" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">"What is our current pipeline</text>
  <text x="210" y="220" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">value by stage?"</text>

  <line x1="380" y1="207" x2="415" y2="207" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="420" y="185" width="190" height="44" rx="6" fill="#4338ca" filter="url(#shadow)"/>
  <text x="515" y="212" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">PipelineAnalyst</text>

  <line x1="610" y1="207" x2="645" y2="207" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="650" y="185" width="240" height="44" rx="6" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="770" y="212" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">SV_CRM_PIPELINE</text>

  <rect x="960" y="188" width="140" height="38" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1030" y="212" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">No</text>

  <!-- ═══ ROW 3: IoT ═══ -->
  <rect x="40" y="252" width="340" height="55" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="210" y="276" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">"Which devices have vibration</text>
  <text x="210" y="292" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">above 5 mm/s?"</text>

  <line x1="380" y1="279" x2="415" y2="279" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="420" y="257" width="190" height="44" rx="6" fill="#4338ca" filter="url(#shadow)"/>
  <text x="515" y="284" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">DeviceAnalyst</text>

  <line x1="610" y1="279" x2="645" y2="279" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="650" y="257" width="240" height="44" rx="6" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="770" y="284" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">SV_IOT_PERFORMANCE</text>

  <rect x="960" y="260" width="140" height="38" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1030" y="284" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">No</text>

  <!-- ═══ ROW 4: ML Prediction ═══ -->
  <rect x="40" y="324" width="340" height="55" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="210" y="348" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">"Which PX devices are at risk</text>
  <text x="210" y="364" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">of failure?"</text>

  <line x1="380" y1="351" x2="415" y2="351" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="420" y="329" width="190" height="44" rx="6" fill="#065f46" filter="url(#shadow)"/>
  <text x="515" y="356" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">PredictFailure</text>

  <line x1="610" y1="351" x2="645" y2="351" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="650" y="329" width="240" height="44" rx="6" fill="#059669" filter="url(#shadow)"/>
  <text x="770" y="356" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">PREDICT_PX_FAILURE()</text>

  <rect x="960" y="332" width="140" height="38" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1030" y="356" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">No</text>

  <!-- ═══ ROW 5: Knowledge / Ontology ═══ -->
  <rect x="40" y="396" width="340" height="55" rx="6" fill="#fefce8" stroke="#eab308" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="210" y="420" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">"What maintenance procedures</text>
  <text x="210" y="436" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">apply to PX Q650?"</text>

  <line x1="380" y1="423" x2="415" y2="423" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="420" y="401" width="190" height="44" rx="6" fill="#0e7490" filter="url(#shadow)"/>
  <text x="515" y="428" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">KnowledgeSearch</text>

  <line x1="610" y1="423" x2="645" y2="423" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="650" y="401" width="240" height="44" rx="6" fill="#155e75" filter="url(#shadow)"/>
  <text x="770" y="428" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">KNOWLEDGE_ARTICLES</text>

  <rect x="960" y="404" width="140" height="38" rx="6" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1030" y="428" text-anchor="middle" font-size="12" font-weight="bold" fill="#16a34a">YES</text>

  <!-- ═══ ROW 6: ISA-95 ═══ -->
  <rect x="40" y="468" width="340" height="55" rx="6" fill="#fefce8" stroke="#eab308" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="210" y="492" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">"How does the ISA-95 hierarchy</text>
  <text x="210" y="508" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">map to production capacity?"</text>

  <line x1="380" y1="495" x2="415" y2="495" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="420" y="473" width="190" height="44" rx="6" fill="#0e7490" filter="url(#shadow)"/>
  <text x="515" y="500" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">KnowledgeSearch</text>

  <line x1="610" y1="495" x2="645" y2="495" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="650" y="473" width="240" height="44" rx="6" fill="#155e75" filter="url(#shadow)"/>
  <text x="770" y="500" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">ISA-95 Ontology Article</text>

  <rect x="960" y="476" width="140" height="38" rx="6" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1030" y="500" text-anchor="middle" font-size="12" font-weight="bold" fill="#16a34a">YES</text>

  <!-- ═══ ROW 7: Cross-Domain ═══ -->
  <rect x="40" y="540" width="340" height="55" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="210" y="564" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">"How does pipeline correlate</text>
  <text x="210" y="580" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">with installed base growth?"</text>

  <line x1="380" y1="560" x2="415" y2="555" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="575" x2="415" y2="580" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="420" y="540" width="190" height="22" rx="5" fill="#4338ca" filter="url(#shadow)"/>
  <text x="515" y="555" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">PipelineAnalyst</text>

  <rect x="420" y="570" width="190" height="22" rx="5" fill="#4338ca" filter="url(#shadow)"/>
  <text x="515" y="585" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">DeviceAnalyst</text>

  <line x1="610" y1="551" x2="645" y2="551" stroke="#334155" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="610" y1="581" x2="645" y2="581" stroke="#334155" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="650" y="540" width="240" height="22" rx="5" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="770" y="555" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">SV_CRM_PIPELINE</text>

  <rect x="650" y="570" width="240" height="22" rx="5" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="770" y="585" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">SV_IOT_PERFORMANCE</text>

  <rect x="960" y="548" width="140" height="38" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1030" y="572" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">No</text>

  <!-- ═══ LEGEND ═══ -->
  <rect x="40" y="620" width="1120" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="600" y="648" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Routing Rules</text>

  <rect x="80" y="668" width="18" height="14" rx="3" fill="#4338ca"/>
  <text x="108" y="680" font-size="10" fill="#334155">Cortex Analyst — text-to-SQL via Semantic View (financial, CRM, IoT structured data)</text>

  <rect x="80" y="694" width="18" height="14" rx="3" fill="#065f46"/>
  <text x="108" y="706" font-size="10" fill="#334155">ML Function — UDF returning predictions (failure risk, efficiency, demand, health)</text>

  <rect x="80" y="720" width="18" height="14" rx="3" fill="#0e7490"/>
  <text x="108" y="732" font-size="10" fill="#334155">Cortex Search — knowledge retrieval from articles (product specs, procedures, ISA-95)</text>

  <rect x="700" y="668" width="18" height="14" rx="3" fill="#dcfce7" stroke="#4ade80"/>
  <text x="728" y="680" font-size="10" fill="#334155">Uses ISA-95 Ontology (manufacturing hierarchy questions)</text>

  <rect x="700" y="694" width="18" height="14" rx="3" fill="#f5f3ff" stroke="#8b5cf6"/>
  <text x="728" y="706" font-size="10" fill="#334155">Cross-domain — multiple tools invoked, results synthesized</text>
</svg>
