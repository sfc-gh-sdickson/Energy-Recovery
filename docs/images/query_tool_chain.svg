<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>

  <!-- White Background -->
  <rect width="1200" height="820" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#0f172a">Query Tool Chain — Example Routing</text>
  <text x="600" y="56" text-anchor="middle" font-size="12" fill="#64748b">How the agent routes questions to tools. Shows when ISA-95 ontology is used.</text>

  <!-- Column Headers -->
  <text x="200" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#64748b">USER QUESTION</text>
  <text x="500" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#64748b">AGENT ROUTES TO</text>
  <text x="780" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#64748b">TARGET RESOURCE</text>
  <text x="1020" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#64748b">USES ONTOLOGY?</text>

  <!-- Row separator -->
  <line x1="40" y1="100" x2="1160" y2="100" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ═══ ROW 1: Financial ═══ -->
  <rect x="40" y="115" width="320" height="50" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="200" y="138" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">"What was our total revenue for</text>
  <text x="200" y="153" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">Q1 2026?"</text>

  <line x1="360" y1="140" x2="400" y2="140" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="405" y="120" width="180" height="40" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <text x="495" y="145" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">FinancialAnalyst</text>

  <line x1="585" y1="140" x2="630" y2="140" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="635" y="120" width="210" height="40" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="740" y="145" text-anchor="middle" font-size="10" fill="#1e40af">SV_FINANCIAL_OPS</text>

  <rect x="930" y="122" width="130" height="36" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="995" y="145" text-anchor="middle" font-size="11" font-weight="bold" fill="#dc2626">No</text>

  <!-- ═══ ROW 2: CRM ═══ -->
  <rect x="40" y="185" width="320" height="50" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="200" y="208" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">"What is our current pipeline</text>
  <text x="200" y="223" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">value by stage?"</text>

  <line x1="360" y1="210" x2="400" y2="210" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="405" y="190" width="180" height="40" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <text x="495" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">PipelineAnalyst</text>

  <line x1="585" y1="210" x2="630" y2="210" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="635" y="190" width="210" height="40" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="740" y="215" text-anchor="middle" font-size="10" fill="#1e40af">SV_CRM_PIPELINE</text>

  <rect x="930" y="192" width="130" height="36" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="995" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="#dc2626">No</text>

  <!-- ═══ ROW 3: IoT ═══ -->
  <rect x="40" y="255" width="320" height="50" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="200" y="278" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">"Which devices have vibration</text>
  <text x="200" y="293" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">above 5 mm/s?"</text>

  <line x1="360" y1="280" x2="400" y2="280" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="405" y="260" width="180" height="40" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <text x="495" y="285" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">DeviceAnalyst</text>

  <line x1="585" y1="280" x2="630" y2="280" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="635" y="260" width="210" height="40" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="740" y="285" text-anchor="middle" font-size="10" fill="#1e40af">SV_IOT_PERFORMANCE</text>

  <rect x="930" y="262" width="130" height="36" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="995" y="285" text-anchor="middle" font-size="11" font-weight="bold" fill="#dc2626">No</text>

  <!-- ═══ ROW 4: ML Prediction ═══ -->
  <rect x="40" y="325" width="320" height="50" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="200" y="348" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">"Which PX devices are at risk</text>
  <text x="200" y="363" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">of failure?"</text>

  <line x1="360" y1="350" x2="400" y2="350" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="405" y="330" width="180" height="40" rx="6" fill="#ffffff" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="495" y="355" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">PredictFailure</text>

  <line x1="585" y1="350" x2="630" y2="350" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="635" y="330" width="210" height="40" rx="6" fill="#ffffff" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="740" y="355" text-anchor="middle" font-size="10" fill="#065f46">PREDICT_PX_FAILURE()</text>

  <rect x="930" y="332" width="130" height="36" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="995" y="355" text-anchor="middle" font-size="11" font-weight="bold" fill="#dc2626">No</text>

  <!-- ═══ ROW 5: Knowledge / Ontology ═══ -->
  <rect x="40" y="395" width="320" height="50" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="200" y="418" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">"What maintenance procedures</text>
  <text x="200" y="433" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">apply to PX Q650?"</text>

  <line x1="360" y1="420" x2="400" y2="420" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="405" y="400" width="180" height="40" rx="6" fill="#ffffff" stroke="#0891b2" stroke-width="2" filter="url(#shadow)"/>
  <text x="495" y="425" text-anchor="middle" font-size="11" font-weight="bold" fill="#0e7490">KnowledgeSearch</text>

  <line x1="585" y1="420" x2="630" y2="420" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="635" y="400" width="210" height="40" rx="6" fill="#ffffff" stroke="#0891b2" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="740" y="425" text-anchor="middle" font-size="10" fill="#0e7490">KNOWLEDGE_ARTICLES</text>

  <rect x="930" y="402" width="130" height="36" rx="6" fill="#ffffff" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="995" y="425" text-anchor="middle" font-size="11" font-weight="bold" fill="#16a34a">YES</text>

  <!-- ═══ ROW 6: ISA-95 Ontology ═══ -->
  <rect x="40" y="465" width="320" height="50" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="200" y="488" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">"How does the ISA-95 hierarchy</text>
  <text x="200" y="503" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">map to production capacity?"</text>

  <line x1="360" y1="490" x2="400" y2="490" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="405" y="470" width="180" height="40" rx="6" fill="#ffffff" stroke="#0891b2" stroke-width="2" filter="url(#shadow)"/>
  <text x="495" y="495" text-anchor="middle" font-size="11" font-weight="bold" fill="#0e7490">KnowledgeSearch</text>

  <line x1="585" y1="490" x2="630" y2="490" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="635" y="470" width="210" height="40" rx="6" fill="#ffffff" stroke="#0891b2" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="740" y="495" text-anchor="middle" font-size="10" fill="#0e7490">ISA-95 Ontology Article</text>

  <rect x="930" y="472" width="130" height="36" rx="6" fill="#ffffff" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="995" y="495" text-anchor="middle" font-size="11" font-weight="bold" fill="#16a34a">YES</text>

  <!-- ═══ ROW 7: Cross-Domain (Multi-tool) ═══ -->
  <rect x="40" y="535" width="320" height="50" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="200" y="558" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">"How does pipeline correlate</text>
  <text x="200" y="573" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">with installed base growth?"</text>

  <line x1="360" y1="553" x2="400" y2="543" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="360" y1="567" x2="400" y2="573" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="405" y="530" width="180" height="24" rx="5" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="495" y="546" text-anchor="middle" font-size="9" font-weight="bold" fill="#5b21b6">PipelineAnalyst</text>

  <rect x="405" y="560" width="180" height="24" rx="5" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="495" y="576" text-anchor="middle" font-size="9" font-weight="bold" fill="#5b21b6">DeviceAnalyst</text>

  <line x1="585" y1="542" x2="630" y2="542" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="585" y1="572" x2="630" y2="572" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="635" y="530" width="210" height="24" rx="5" fill="#ffffff" stroke="#3b82f6" stroke-width="1" filter="url(#shadow)"/>
  <text x="740" y="546" text-anchor="middle" font-size="9" fill="#1e40af">SV_CRM_PIPELINE</text>

  <rect x="635" y="560" width="210" height="24" rx="5" fill="#ffffff" stroke="#3b82f6" stroke-width="1" filter="url(#shadow)"/>
  <text x="740" y="576" text-anchor="middle" font-size="9" fill="#1e40af">SV_IOT_PERFORMANCE</text>

  <rect x="930" y="542" width="130" height="36" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="995" y="565" text-anchor="middle" font-size="11" font-weight="bold" fill="#dc2626">No</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LEGEND -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="40" y="620" width="1120" height="180" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="600" y="650" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Routing Rules Summary</text>

  <rect x="80" y="670" width="16" height="16" rx="3" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  <text x="105" y="683" font-size="10" fill="#334155">Cortex Analyst — text-to-SQL via Semantic View (financial, CRM, IoT structured data)</text>

  <rect x="80" y="698" width="16" height="16" rx="3" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <text x="105" y="711" font-size="10" fill="#334155">ML Function — UDF returning prediction results (failure risk, efficiency, demand, health)</text>

  <rect x="80" y="726" width="16" height="16" rx="3" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
  <text x="105" y="739" font-size="10" fill="#334155">Cortex Search — knowledge retrieval from articles (product specs, procedures, ISA-95)</text>

  <rect x="80" y="754" width="16" height="16" rx="3" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="105" y="767" font-size="10" fill="#334155">Uses ISA-95 Ontology — question involves manufacturing hierarchy, processes, or equipment classes</text>

  <text x="650" y="683" font-size="10" fill="#64748b" font-weight="bold">Cross-domain questions invoke multiple tools;</text>
  <text x="650" y="700" font-size="10" fill="#64748b">the agent synthesizes results into a unified answer.</text>
</svg>
