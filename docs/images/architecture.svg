<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 780" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
    </marker>
  </defs>

  <!-- White main background -->
  <rect width="1400" height="780" fill="#ffffff"/>

  <!-- Title -->
  <text x="700" y="38" text-anchor="middle" font-size="24" font-weight="bold" fill="#0f172a">Energy Recovery &#x2014; System Architecture</text>

  <!-- =============================================================== -->
  <!-- LAYER 5: AGENT (Top) -->
  <!-- =============================================================== -->
  <rect x="60" y="60" width="1280" height="90" rx="12" fill="#0f766e" filter="url(#shadow)"/>
  <text x="120" y="85" font-size="12" font-weight="bold" fill="#99f6e4">AGENT LAYER</text>

  <rect x="320" y="80" width="760" height="55" rx="8" fill="#134e4a" filter="url(#shadow)"/>
  <text x="700" y="104" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">ENERGY_RECOVERY_AGENT</text>
  <text x="700" y="124" text-anchor="middle" font-size="11" fill="#a7f3d0">Natural Language Interface &#x2014; 8 Tools &#x2014; Executives, Engineers, Operators, Sales, Finance</text>

  <!-- =============================================================== -->
  <!-- LAYER 4: TOOL LAYER -->
  <!-- =============================================================== -->
  <rect x="60" y="175" width="1280" height="120" rx="12" fill="#312e81" filter="url(#shadow)"/>
  <text x="120" y="200" font-size="12" font-weight="bold" fill="#c7d2fe">TOOL LAYER</text>

  <rect x="90" y="210" width="270" height="65" rx="8" fill="#4338ca" filter="url(#shadow)"/>
  <text x="225" y="236" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">FinancialAnalyst</text>
  <text x="225" y="256" text-anchor="middle" font-size="10" fill="#c7d2fe">Cortex Analyst (text-to-SQL)</text>

  <rect x="380" y="210" width="270" height="65" rx="8" fill="#4338ca" filter="url(#shadow)"/>
  <text x="515" y="236" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">PipelineAnalyst</text>
  <text x="515" y="256" text-anchor="middle" font-size="10" fill="#c7d2fe">Cortex Analyst (text-to-SQL)</text>

  <rect x="670" y="210" width="270" height="65" rx="8" fill="#4338ca" filter="url(#shadow)"/>
  <text x="805" y="236" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">DeviceAnalyst</text>
  <text x="805" y="256" text-anchor="middle" font-size="10" fill="#c7d2fe">Cortex Analyst (text-to-SQL)</text>

  <rect x="960" y="210" width="170" height="65" rx="8" fill="#0e7490" filter="url(#shadow)"/>
  <text x="1045" y="236" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">KnowledgeSearch</text>
  <text x="1045" y="256" text-anchor="middle" font-size="10" fill="#a5f3fc">Cortex Search</text>

  <rect x="1150" y="210" width="170" height="65" rx="8" fill="#065f46" filter="url(#shadow)"/>
  <text x="1235" y="236" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">ML Functions (4)</text>
  <text x="1235" y="256" text-anchor="middle" font-size="10" fill="#a7f3d0">Predict | Score | Forecast</text>

  <!-- Arrow from Tool Layer up to Agent -->
  <line x1="700" y1="175" x2="700" y2="150" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =============================================================== -->
  <!-- LAYER 3: SEMANTIC LAYER -->
  <!-- =============================================================== -->
  <rect x="60" y="320" width="1280" height="120" rx="12" fill="#581c87" filter="url(#shadow)"/>
  <text x="120" y="345" font-size="12" font-weight="bold" fill="#e9d5ff">SEMANTIC LAYER</text>

  <rect x="90" y="355" width="290" height="65" rx="8" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="235" y="381" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">SV_FINANCIAL_OPS</text>
  <text x="235" y="401" text-anchor="middle" font-size="10" fill="#ddd6fe">Revenue, Orders, Invoices, AR, GL</text>

  <rect x="400" y="355" width="290" height="65" rx="8" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="545" y="381" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">SV_CRM_PIPELINE</text>
  <text x="545" y="401" text-anchor="middle" font-size="10" fill="#ddd6fe">Opportunities, Accounts, Activities</text>

  <rect x="710" y="355" width="290" height="65" rx="8" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="855" y="381" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">SV_IOT_PERFORMANCE</text>
  <text x="855" y="401" text-anchor="middle" font-size="10" fill="#ddd6fe">Devices, Telemetry, Alarms, Maintenance</text>

  <rect x="1020" y="355" width="300" height="65" rx="8" fill="#a16207" filter="url(#shadow)"/>
  <text x="1170" y="381" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">ISA-95 Ontology + Knowledge Base</text>
  <text x="1170" y="401" text-anchor="middle" font-size="10" fill="#fef3c7">Enterprise &#x2192; Site &#x2192; Area &#x2192; WC &#x2192; WU</text>

  <!-- Arrow from Semantic up to Tool -->
  <line x1="700" y1="320" x2="700" y2="295" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =============================================================== -->
  <!-- LAYER 2: DATA LAYER -->
  <!-- =============================================================== -->
  <rect x="60" y="465" width="1280" height="130" rx="12" fill="#1e3a5f" filter="url(#shadow)"/>
  <text x="120" y="490" font-size="12" font-weight="bold" fill="#bae6fd">DATA LAYER (Snowflake Schemas)</text>

  <rect x="90" y="500" width="280" height="75" rx="8" fill="#1d4ed8" filter="url(#shadow)"/>
  <text x="230" y="526" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">DYNAMICS_CRM</text>
  <text x="230" y="544" text-anchor="middle" font-size="10" fill="#bfdbfe">Accounts | Contacts</text>
  <text x="230" y="560" text-anchor="middle" font-size="10" fill="#bfdbfe">Opportunities | Activities</text>

  <rect x="390" y="500" width="280" height="75" rx="8" fill="#1d4ed8" filter="url(#shadow)"/>
  <text x="530" y="526" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">DYNAMICS_FINANCE</text>
  <text x="530" y="544" text-anchor="middle" font-size="10" fill="#bfdbfe">GL | Sales Orders | Invoices</text>
  <text x="530" y="560" text-anchor="middle" font-size="10" fill="#bfdbfe">Accounts Receivable | AP</text>

  <rect x="690" y="500" width="280" height="75" rx="8" fill="#1d4ed8" filter="url(#shadow)"/>
  <text x="830" y="526" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">SCADA_IOT</text>
  <text x="830" y="544" text-anchor="middle" font-size="10" fill="#bfdbfe">Device Registry (42,000+)</text>
  <text x="830" y="560" text-anchor="middle" font-size="10" fill="#bfdbfe">Telemetry | Alarms | Maintenance</text>

  <rect x="990" y="500" width="330" height="75" rx="8" fill="#1d4ed8" filter="url(#shadow)"/>
  <text x="1155" y="526" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">ORACLE_ERP + ONTOLOGY</text>
  <text x="1155" y="544" text-anchor="middle" font-size="10" fill="#bfdbfe">Production | BOM | Inventory | Suppliers</text>
  <text x="1155" y="560" text-anchor="middle" font-size="10" fill="#bfdbfe">ISA-95 Tables | Knowledge Articles</text>

  <!-- Arrow from Data up to Semantic -->
  <line x1="700" y1="465" x2="700" y2="440" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- =============================================================== -->
  <!-- LAYER 1: DATA SOURCE LAYER (Bottom) -->
  <!-- =============================================================== -->
  <rect x="60" y="620" width="1280" height="130" rx="12" fill="#374151" filter="url(#shadow)"/>
  <text x="120" y="645" font-size="12" font-weight="bold" fill="#d1d5db">DATA SOURCE LAYER (External Systems)</text>

  <rect x="90" y="658" width="360" height="72" rx="8" fill="#4b5563" filter="url(#shadow)"/>
  <text x="270" y="686" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Microsoft Dynamics 365</text>
  <text x="270" y="706" text-anchor="middle" font-size="10" fill="#d1d5db">CRM + Finance &amp; Operations</text>
  <text x="270" y="720" text-anchor="middle" font-size="9" fill="#9ca3af">Streaming via Change Data Capture</text>

  <rect x="480" y="658" width="360" height="72" rx="8" fill="#4b5563" filter="url(#shadow)"/>
  <text x="660" y="686" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">SCADA / IoT Systems</text>
  <text x="660" y="706" text-anchor="middle" font-size="10" fill="#d1d5db">42,000+ PX Pressure Exchangers</text>
  <text x="660" y="720" text-anchor="middle" font-size="9" fill="#9ca3af">Real-time sensor streaming</text>

  <rect x="870" y="658" width="360" height="72" rx="8" fill="#4b5563" filter="url(#shadow)"/>
  <text x="1050" y="686" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Oracle ERP</text>
  <text x="1050" y="706" text-anchor="middle" font-size="10" fill="#d1d5db">Manufacturing &amp; Supply Chain</text>
  <text x="1050" y="720" text-anchor="middle" font-size="9" fill="#9ca3af">Batch + streaming ingestion</text>

  <!-- Arrow from Source up to Data -->
  <line x1="700" y1="620" x2="700" y2="595" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
