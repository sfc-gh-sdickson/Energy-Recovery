<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 700" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>

  <!-- White Background -->
  <rect width="1400" height="700" fill="#ffffff"/>

  <!-- Title -->
  <text x="700" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#0f172a">Energy Recovery — System Architecture</text>
  <text x="700" y="62" text-anchor="middle" font-size="13" fill="#64748b">Agent at top | Data flows left to right | Streaming-first ELT Pipeline</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- AGENT (Top Center) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="480" y="90" width="440" height="80" rx="12" fill="#0f766e" filter="url(#shadow)"/>
  <text x="700" y="122" text-anchor="middle" font-size="18" font-weight="bold" fill="#ffffff">ENERGY_RECOVERY_AGENT</text>
  <text x="700" y="146" text-anchor="middle" font-size="12" fill="#ccfbf1">3 Cortex Analyst  |  1 Cortex Search  |  4 ML Functions</text>
  <text x="700" y="162" text-anchor="middle" font-size="11" fill="#99f6e4">Natural Language → Insights for Executives, Engineers, Operators</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- INTELLIGENCE LAYER (Row 2) -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Semantic Views -->
  <rect x="80" y="220" width="240" height="70" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <text x="200" y="250" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b21b6">Semantic Views</text>
  <text x="200" y="270" text-anchor="middle" font-size="10" fill="#6d28d9">SV_FINANCIAL_OPS</text>
  <text x="200" y="284" text-anchor="middle" font-size="10" fill="#6d28d9">SV_CRM_PIPELINE | SV_IOT_PERFORMANCE</text>

  <!-- Cortex Search -->
  <rect x="380" y="220" width="240" height="70" rx="8" fill="#ffffff" stroke="#0891b2" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="250" text-anchor="middle" font-size="13" font-weight="bold" fill="#0e7490">Cortex Search</text>
  <text x="500" y="270" text-anchor="middle" font-size="10" fill="#155e75">KNOWLEDGE_SEARCH</text>
  <text x="500" y="284" text-anchor="middle" font-size="10" fill="#155e75">Product Specs, Procedures, ISA-95</text>

  <!-- ML Functions -->
  <rect x="680" y="220" width="240" height="70" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="800" y="250" text-anchor="middle" font-size="13" font-weight="bold" fill="#065f46">ML Prediction Functions</text>
  <text x="800" y="270" text-anchor="middle" font-size="10" fill="#047857">PredictFailure | ScoreEfficiency</text>
  <text x="800" y="284" text-anchor="middle" font-size="10" fill="#047857">ForecastDemand | EquipmentHealth</text>

  <!-- ISA-95 Ontology -->
  <rect x="980" y="220" width="240" height="70" rx="8" fill="#ffffff" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
  <text x="1100" y="250" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">ISA-95 Ontology</text>
  <text x="1100" y="270" text-anchor="middle" font-size="10" fill="#a16207">Enterprise → Site → Area</text>
  <text x="1100" y="284" text-anchor="middle" font-size="10" fill="#a16207">→ Work Center → Work Unit</text>

  <!-- Arrows from Intelligence to Agent -->
  <line x1="200" y1="220" x2="560" y2="170" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="220" x2="640" y2="170" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="800" y1="220" x2="760" y2="170" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1100" y1="220" x2="840" y2="170" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ANALYTICS LAYER (Row 3) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="80" y="340" width="1140" height="60" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="700" y="367" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">ANALYTICS SCHEMA — Cross-Domain Views</text>
  <text x="700" y="387" text-anchor="middle" font-size="11" fill="#2563eb">V_FINANCIAL_SUMMARY  |  V_REVENUE_BY_PRODUCT  |  V_AR_AGING  |  V_SALES_PIPELINE  |  V_DEVICE_HEALTH  |  V_SUPPLY_CHAIN</text>

  <!-- Arrows from Analytics up to Intelligence -->
  <line x1="200" y1="340" x2="200" y2="290" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="340" x2="500" y2="290" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="800" y1="340" x2="800" y2="290" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1100" y1="340" x2="1100" y2="290" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- SOURCE SCHEMAS (Row 4) - Data flows left to right -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <rect x="80" y="450" width="260" height="80" rx="8" fill="#ffffff" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <text x="210" y="478" text-anchor="middle" font-size="13" font-weight="bold" fill="#4338ca">DYNAMICS_CRM</text>
  <text x="210" y="496" text-anchor="middle" font-size="10" fill="#4f46e5">Accounts | Contacts</text>
  <text x="210" y="512" text-anchor="middle" font-size="10" fill="#4f46e5">Opportunities | Activities</text>

  <rect x="380" y="450" width="260" height="80" rx="8" fill="#ffffff" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <text x="510" y="478" text-anchor="middle" font-size="13" font-weight="bold" fill="#4338ca">DYNAMICS_FINANCE</text>
  <text x="510" y="496" text-anchor="middle" font-size="10" fill="#4f46e5">GL | Sales Orders | Invoices</text>
  <text x="510" y="512" text-anchor="middle" font-size="10" fill="#4f46e5">Accounts Receivable | AP</text>

  <rect x="680" y="450" width="260" height="80" rx="8" fill="#ffffff" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <text x="810" y="478" text-anchor="middle" font-size="13" font-weight="bold" fill="#4338ca">SCADA_IOT</text>
  <text x="810" y="496" text-anchor="middle" font-size="10" fill="#4f46e5">Device Registry (42,000+)</text>
  <text x="810" y="512" text-anchor="middle" font-size="10" fill="#4f46e5">Telemetry | Alarms | Maintenance</text>

  <rect x="980" y="450" width="240" height="80" rx="8" fill="#ffffff" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <text x="1100" y="478" text-anchor="middle" font-size="13" font-weight="bold" fill="#4338ca">ORACLE_ERP</text>
  <text x="1100" y="496" text-anchor="middle" font-size="10" fill="#4f46e5">Production Orders | BOM</text>
  <text x="1100" y="512" text-anchor="middle" font-size="10" fill="#4f46e5">Inventory | Suppliers | PO</text>

  <!-- Arrows from Schemas up to Analytics -->
  <line x1="210" y1="450" x2="210" y2="400" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="510" y1="450" x2="510" y2="400" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="810" y1="450" x2="810" y2="400" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1100" y1="450" x2="1100" y2="400" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- SOURCE SYSTEMS (Row 5 - Bottom) -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <rect x="80" y="590" width="260" height="60" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="210" y="618" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">Microsoft Dynamics 365</text>
  <text x="210" y="636" text-anchor="middle" font-size="10" fill="#64748b">CRM + Finance &amp; Operations</text>

  <rect x="480" y="590" width="260" height="60" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="610" y="618" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">SCADA Systems</text>
  <text x="610" y="636" text-anchor="middle" font-size="10" fill="#64748b">IoT Sensors on PX Devices</text>

  <rect x="880" y="590" width="240" height="60" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1000" y="618" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">Oracle ERP</text>
  <text x="1000" y="636" text-anchor="middle" font-size="10" fill="#64748b">Manufacturing &amp; Supply Chain</text>

  <!-- Arrows from Source Systems to Schemas -->
  <line x1="210" y1="590" x2="210" y2="530" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="610" y1="590" x2="810" y2="530" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1000" y1="590" x2="1100" y2="530" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Left label: Streaming Ingestion -->
  <text x="40" y="560" font-size="10" fill="#94a3b8" transform="rotate(-90 40 560)">Streaming Ingestion</text>

  <!-- Right side: Snowflake Platform label -->
  <rect x="1260" y="340" width="120" height="190" rx="8" fill="#f0f9ff" stroke="#29b5e8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1320" y="380" text-anchor="middle" font-size="11" font-weight="bold" fill="#0369a1">Snowflake</text>
  <text x="1320" y="396" text-anchor="middle" font-size="11" font-weight="bold" fill="#0369a1">Data Cloud</text>
  <text x="1320" y="430" text-anchor="middle" font-size="9" fill="#0c4a6e">Compute</text>
  <text x="1320" y="450" text-anchor="middle" font-size="9" fill="#0c4a6e">Storage</text>
  <text x="1320" y="470" text-anchor="middle" font-size="9" fill="#0c4a6e">Cortex AI</text>
  <text x="1320" y="490" text-anchor="middle" font-size="9" fill="#0c4a6e">Auto-Scale</text>
  <text x="1320" y="510" text-anchor="middle" font-size="9" fill="#0c4a6e">Governance</text>
</svg>
